<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Portfolio AI · Next‑Gen Chatbot</title>
  <!-- Firebase SDK (optional) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0a0c0f;
      --surface: #12151a;
      --surface2: #1a1e25;
      --border: #2a2f38;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --accent: #a78bfa;
      --accent2: #34d399;
      --danger: #f87171;
      --glow: rgba(167,139,250,0.4);
      --radius: 22px;
      --radius-sm: 14px;
      --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body.light {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface2: #eef1f6;
      --border: #d1d5db;
      --text: #1e293b;
      --text2: #475569;
      --accent: #7c3aed;
      --accent2: #059669;
      --danger: #dc2626;
      --glow: rgba(124,58,237,0.25);
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s;
      margin: 0;
      padding: 16px;
    }
    /* animated scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 4px);
      z-index: 999;
      opacity: 0.25;
    }
    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      height: 700px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 20px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(167,139,250,0.2);
      overflow: hidden;
      position: relative;
      z-index: 1;
      transition: all var(--transition);
    }
    .chat-wrapper::before {
      content: '';
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent));
      background-size: 300% 300%;
      animation: borderGlow 8s ease infinite;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      padding: 2px;
    }
    @keyframes borderGlow {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .chat-header {
      display: flex; align-items: center; gap: 12px; padding: 16px 18px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .bot-avatar-wrap { position: relative; flex-shrink: 0; }
    .bot-avatar {
      width: 50px; height: 50px; border-radius: 50%; background: #1e1b2e;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--accent); box-shadow: 0 0 20px var(--glow);
      transition: all 0.2s; overflow: hidden;
    }
    .bot-face { width: 38px; height: 38px; transition: 0.25s; }
    .online-dot {
      position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px;
      background: var(--accent2); border-radius: 50%; border: 2px solid var(--surface2);
      box-shadow: 0 0 12px var(--accent2);
    }
    .header-info { flex:1; }
    .header-name { font-weight: 700; color: var(--text); font-size: 1.1rem; }
    .header-status { font-size: 0.75rem; color: var(--accent2); }
    .icon-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text2);
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; margin-left: 6px; font-size: 1rem;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px var(--glow); }
    .messages-area {
      flex:1; overflow-y: auto; padding: 16px 14px; display: flex;
      flex-direction: column; gap: 12px; scroll-behavior: smooth;
    }
    .message-row { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.3s ease; }
    .message-row.user { flex-direction: row-reverse; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(14px); } }
    .msg-avatar-mini {
      width: 30px; height: 30px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: bold; border:1px solid var(--border);
    }
    .msg-bubble {
      max-width: 75%; padding: 12px 15px; border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text); border:1px solid var(--border);
      line-height: 1.45; position: relative; word-break: break-word;
      transition: background 0.2s;
    }
    .message-row.user .msg-bubble {
      background: rgba(167,139,250,0.12); border-color: var(--accent);
      color: #fff;
    }
    .msg-time { font-size: 0.65rem; color: var(--text2); margin-top: 4px; }
    .typing-cursor {
      display: inline-block; width: 8px; height: 16px; background: var(--accent);
      margin-left: 2px; animation: blink 0.9s infinite; vertical-align: middle;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px; }
    .chip {
      padding: 8px 16px; border-radius: 20px; background: transparent;
      border:1px solid var(--accent); color: var(--accent); cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s;
    }
    .chip:hover { background: rgba(167,139,250,0.15); }
    .input-area { display: flex; gap: 10px; padding: 14px 16px; background: var(--surface2); border-top:1px solid var(--border); align-items: flex-end; }
    .input-wrap { flex:1; background: var(--surface); border:1px solid var(--border); border-radius: 30px; display: flex; align-items: flex-end; transition: 0.2s; }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 12px var(--glow); }
    .chat-input {
      width:100%; border:none; background:transparent; resize:none; padding:12px 16px;
      color:var(--text); font-size:0.9rem; outline:none; max-height:110px; line-height:1.4;
    }
    .send-btn {
      width:46px; height:46px; border-radius:50%; border:none; background:var(--accent);
      color:white; font-size:1.2rem; cursor:pointer; box-shadow:0 0 18px var(--glow);
      transition: all 0.2s;
    }
    .send-btn:hover { transform: scale(1.05); }
    .toast {
      position: fixed; bottom: 20px; left:50%; transform: translateX(-50%);
      background: var(--surface2); color: var(--text); padding: 10px 24px;
      border-radius: 30px; font-size:0.85rem; border:1px solid var(--border);
      opacity:0; transition: 0.3s; pointer-events: none; z-index:200;
    }
    .toast.show { opacity:1; transform: translateX(-50%) translateY(-8px); }
    /* confetti */
    canvas#confettiCanvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="bot-avatar-wrap">
        <div class="bot-avatar" id="botAvatar"><img class="bot-face" id="botFace" src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f916/512.webp" alt="face"></div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <div class="header-name" id="headerName">AI Assistant</div>
        <div class="header-status" id="headerStatus">● under testing</div>
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">🌓</button>
      <button class="icon-btn" id="clearChat" title="Clear chat">🗑️</button>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="quick-replies" id="quickReplies">
      <span class="chip" data-query="skills">💡 Skills</span>
      <span class="chip" data-query="projects">🚀 Projects</span>
      <span class="chip" data-query="contact">📬 Contact</span>
      <span class="chip" data-query="rps rock">✊ Rock Paper Scissors</span>
    </div>
    <div class="input-area">
      <div class="input-wrap"><textarea class="chat-input" id="chatInput" rows="1" placeholder="Type a message or command..." maxlength="500"></textarea></div>
      <button class="icon-btn" id="micBtn" style="font-size:1.2rem;">🎤</button>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
<script src="ai-resume.js"></script> 

</body>
</html>
